<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Healthcare Dashboard</title>
    <style>
      body { font-family: Inter, sans-serif; margin: 0; background: #07111f; color: #f8fafc; }
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; padding: 24px; }
      .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); padding: 16px; border-radius: 16px; }
      h1 { padding: 24px 24px 0; margin: 0; }
      .muted { color: #92a1b8; }
    </style>
  </head>
  <body>
    <h1>Healthcare Operations Dashboard</h1>
    <div class="cards">
      <div class="card"><h3>Appointments</h3><p class="muted">Track upcoming visits</p></div>
      <div class="card"><h3>Medications</h3><p class="muted">Monitor adherence</p></div>
      <div class="card"><h3>Treatments</h3><p class="muted">Review active plans</p></div>
      <div class="card"><h3>Reports</h3><p class="muted">Generate patient insights</p></div>
    </div>
  </body>
</html>
